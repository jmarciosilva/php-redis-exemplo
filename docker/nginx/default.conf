# Esse arquivo configura o Nginx, que é o servidor web que recebe as requisições
# HTTP do navegador e decide o que fazer com elas. Como nosso PHP não sabe "falar HTTP"
# sozinho (ele fala FastCGI), o Nginx é quem repassa as requisições pro PHP-FPM.

server {
    # Porta que o Nginx escuta DENTRO do container (por fora, no docker-compose.yml,
    # a gente mapeia isso pra porta 8080 da sua máquina).
    listen 80;

    # Nome do "site" (não importa muito rodando local, mas é boa prática declarar).
    server_name localhost;

    # Pasta raiz onde o Nginx vai procurar os arquivos públicos da aplicação.
    # É por isso que só a pasta "public/" fica exposta pro mundo, e o resto
    # do projeto (config/, src/) fica protegido, fora do alcance direto do navegador.
    root /var/www/public;

    # Arquivo padrão a ser servido quando a URL não aponta pra um arquivo específico
    # (ex.: acessar http://localhost:8080/ sem nada depois da barra).
    index index.php;

    # Bloco que trata QUALQUER requisição (ex.: /produto.php, /qualquer-coisa).
    location / {
        # Tenta achar o arquivo exatamente como veio na URL ($uri), depois tenta
        # como se fosse uma pasta ($uri/), e se não achar nada, cai pro index.php
        # (isso é útil se um dia a gente quiser um "roteador" central).
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Bloco especial: toda URL que termina em ".php" precisa ser processada pelo PHP,
    # e não devolvida como um arquivo de texto puro.
    location ~ \.php$ {
        # Repassa a requisição pro container "php" (nome do serviço no docker-compose.yml),
        # na porta 9000, que é onde o PHP-FPM fica escutando.
        fastcgi_pass php:9000;

        # Se a URL não especificar um arquivo .php, usa esse como padrão.
        fastcgi_index index.php;

        # Inclui as configurações padrão do FastCGI (arquivo que já vem pronto no Nginx).
        include fastcgi_params;

        # Informa ao PHP-FPM o caminho completo do arquivo .php que deve ser executado.
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Bloqueia o acesso a qualquer arquivo que comece com ".", tipo ".env" ou ".git".
    # Isso evita que alguém acesse informações sensíveis direto pela URL.
    location ~ /\.(?!well-known) {
        deny all;
    }
}
